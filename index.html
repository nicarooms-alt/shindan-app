    }

      width: 0%;

      background: #fff; border-radius: 20px;
      padding: 28px 22px; margin-bottom: 14px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.07);

    }

    .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .choice-btn {

      border-color: #85B5D3;
      background: linear-gradient(135deg, #85B5D3, #7aaec8);
      color: #fff;
    }

      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid currentColor; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

      content: ''; width: 8px; height: 8px;
      background: #fff; border-radius: 50%;
    }

    .nav-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-back {

      padding: 14px; font-size: 14px; color: #999; background: transparent;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }

    .btn-next {
      flex: 2; border: none; border-radius: 13px;

      background: linear-gradient(135deg, #85B5D3, #6a9fbf);

      display: inline-block; font-size: 12px; font-weight: 600;
      letter-spacing: 1px; color: #fff; border-radius: 20px;
      padding: 5px 16px; margin-bottom: 12px;
    }
    .result-name { font-size: 24px; font-weight: 700; color: #222; }

    .r-catchphrase {

      margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
    }
    .r-catchphrase p {
      font-size: 16px; font-weight: 700; color: #333;
      line-height: 1.8; letter-spacing: 0.3px;
    }

      background: #fff; border-radius: 18px; padding: 22px 20px;
      margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .r-card-title {
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      color: #85B5D3; margin-bottom: 12px;
    }
    .r-card p { font-size: 14px; color: #555; line-height: 2; }

    .cta-card {

      border-radius: 18px; padding: 22px 20px;
      margin-bottom: 14px; text-align: center;
    }
    .cta-card p { font-size: 14px; color: #555; line-height: 2; margin-bottom: 0; }

    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }

    .score-fill {
      height: 100%; border-radius: 4px; width: 0%;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .score-val { font-size: 12px; color: #aaa; width: 20px; text-align: right; }

    .btn-main {
      width: 100%; border: none; border-radius: 14px;
      padding: 18px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      color: #fff; transition: all 0.3s; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
    .btn-sub {
      width: 100%; border: 1.5px solid #ddd; border-radius: 14px;
      padding: 14px; font-size: 14px; color: #999; background: transparent;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }
    .btn-sub:hover { border-color: #85B5D3; color: #85B5D3; }

    .footer-note { text-align: center; font-size: 12px; color: #bbb; margin-top: 16px; padding-bottom: 8px; }

    .fade-up { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ===== START SCREEN ===== -->

  <!-- ===== RESULT SCREEN ===== -->
  <div id="resultScreen"></div>

</div>

<script>

  { text:"値段を見て「私には勿体ない」「私には合わない」と感じてしまうことがある", type:5 },

  { text:"お金の話になると緊張したり、話題を変えたくなる気持ちがある", type:5 },
];

const CHOICES = [
  { label:"すごくそう思う",  point:3 },
  { label:"わりとそう思う",  point:2 },
  { label:"少しそう思う",    point:1 },
  { label:"あまり思わない",  point:0 },

  {

    catchphrase:"頑張れば頑張るほど、自分が遠くなっていくあなたへ",
    desc:"「もっとできるはず」「まだまだ足りない」という感覚が、どこかに染みついていませんか？\n\n結果を出しても素直に喜べなかったり、達成した瞬間にもう次の目標を探してしまったり。心のどこかに、「これくらいで満足してはいけない」というプレッシャーが常にあるかもしれません。\n\nそしてお金に対しても、「自分がこんなに稼いでいいのかな」「受け取ることへの罪悪感」のようなものを感じたことはないですか？\n\nこれらはあなたの性格でも意志の弱さでもありません。幼い頃にお父さんとの関係の中で、無意識に「頑張っていないと認められない」「結果を出してこそ価値がある」と学んできた、潜在意識のパターンなんです。あなたのせいじゃない。ただ、そうするしかない環境があっただけです。",
    strengths:"このパターンを持つ人は、実はとても高い能力と強さを持っています。\n\n高い基準を自分に課せるということは、それだけのビジョンと実力があるということ。責任感が強く、頼まれたことは必ずやり遂げる。周りから「信頼できる人」として見られることが多いはずです。\n\n「頑張り続けてきた」こと自体が、あなたの才能の証。その力を、自分を追い詰めるためではなく、自分を豊かにするために使えたとき、本当の強さが開花します。",
    relationships:"人間関係では「しっかりした人」「強い人」として見られることが多く、自然とリーダー的な立場になることもあるでしょう。\n\nでもその反面、弱みを見せることがとても怖い。誰かに頼ることへの抵抗感があって、「自分でどうにかしなきゃ」と一人で抱え込んでしまう。本当は誰かに甘えたいのに、甘え方がわからないまま、ずっと頑張り続けてきたのかもしれません。\n\n「完璧な自分でいないと愛されない」という感覚が、心のどこかに残っていませんか？",
    future:"セッションを経て変わっていくのは、「頑張らなくても大丈夫」という感覚を体の中から感じられるようになること。\n\nお金を受け取ることへの罪悪感がなくなり、豊かさを自然に受け取れるようになります。「今の自分で十分」という感覚が戻ってきて、結果ではなく存在そのものに価値があると、心から感じられるようになっていきます。\n\n頑張り続けてきたあなたが、やっと休める場所を見つけるような感覚です。",
  },
  {

    catchphrase:"ひとりで頑張ることが、当たり前になっているあなたへ",
    desc:"「大丈夫？」と聞かれると、反射的に「大丈夫です」と答えてしまう。人に頼むくらいなら自分でやった方が早い、と思って気づけばひとりで全部抱え込んでしまう。そんな自分に、心当たりはありませんか？\n\n弱音を吐くことへの罪悪感、甘えることへの抵抗感。「迷惑をかけてはいけない」「しっかりしなきゃ」という感覚が、体に染みついているかもしれません。\n\n本当は疲れているのに、「まだ大丈夫」と自分に言い聞かせながら動き続けてきた。周りの人が幸せでないと、自分だけ幸せになってはいけない気がする、という感覚もあるかもしれません。\n\nその根っこには、お母さんとの関係の中で無意識に学んできた「頼ってはいけない」「いい子でいなければ」というパターンが眠っています。本当は甘えたかった気持ちが、今も心の奥にそっとあるんです。それはあなたが強いからではなく、そうするしかない環境の中で生き抜いてきた証です。",
    strengths:"このパターンを持つ人は、人一倍思いやりが深く、責任感が強いという才能を持っています。\n\n人の気持ちをよく察知できる、気が利く、信頼される。周りからは「しっかりしてる人」「頼れる存在」として見られることが多いはず。場の空気を読んで、誰かが困っていたら自然と動ける、そんな優しさがあります。\n\n頑張れる力も、気を遣える心も、本当はすごい才能。ただ、その力をずっと「自分を守るため」「誰かのため」だけに使ってきただけなんです。その力を、自分自身のためにも使えるようになったとき、あなたの人生は大きく変わります。",
    relationships:"人に頼られることは得意なのに、自分が誰かを頼ることはとても苦手。「なんで私ばかり」とふと感じることがあっても、それを口に出せない。\n\n本音を言ったら嫌われるんじゃないか、重たいと思われるんじゃないか、という恐れが、いつもどこかにある。だから「いい人」を演じ続けて、気づいたら心がすり減っていることも。\n\n表面上は明るく、人当たりよく振る舞えているのに、心の中ではいつもどこか疲れている。そんな孤独感を、一人で抱えてきたのかもしれません。",
    future:"「大丈夫じゃないとき、大丈夫じゃないと言える自分」になっていきます。\n\n頼ることへの罪悪感がなくなって、自然に「助けて」が言えるようになる。誰かに甘えることが、迷惑じゃなくて「お互い様」だと感じられるようになります。\n\n我慢じゃなく、本当の意味で「大丈夫」と感じられる毎日に変わっていきます。ひとりで抱え込まなくていい。そう心から思えたとき、あなたの周りの関係性も、少しずつ温かくなっていきます。",
  },
  {

    desc:"「またこのパターンだ…」と感じたことはありませんか？人間関係でも、仕事でも、なぜか似たような状況を繰り返してしまう。頑張って変えようとしても、気づけば同じところに戻ってきてしまう。\n\nある言葉や場面に触れると、急に気持ちが沈んだり体が固まるような感覚になることがある。それはトラウマとか大げさなものじゃなくて、過去のある出来事が潜在意識の中にそのまま残っているサインです。\n\n繰り返してきたのは、意志が弱いからでも、運が悪いからでもない。潜在意識が過去の体験をもとに「これが安全」と判断して、同じ行動パターンを選び続けているだけなんです。\n\n過去の記憶は消えなくても、その記憶に対する「感情」は変えることができます。潜在意識の中で記憶を書き換えることで、今まで繰り返してきたループから、静かに抜け出すことができます。",
    strengths:"このパターンを持つ人は、深い共感力と豊かな感受性を持っています。\n\n自分が辛い経験をしてきたからこそ、人の痛みがわかる。誰かが苦しんでいるとき、言葉にしなくてもそっと寄り添える。そういう深いところで繋がれる力が、あなたの中にあります。\n\nまた、過去と向き合ってきた経験は、物事を表面だけでなく深いところまで理解できる力になっています。気づく力、感じる力、それはあなただけが持っている才能です。",
    relationships:"無意識に、過去の人間関係のパターンを今の関係に重ねてしまうことがあります。\n\n「また同じだ」という先入観が、新しい関係を難しくすることがある。傷ついた経験から、人を信じることに慎重になっている。親しくなりかけると、なぜか距離を置いてしまう、ということも。\n\nそれはあなたが冷たいのではなく、心を守るための自然な反応です。でもその壁が、本当は望んでいる深い繋がりを遠ざけてしまっているかもしれません。",

  },

// =============================================
// STATE
// =============================================
let cur = 0;
let answers = new Array(QUESTIONS.length).fill(null);

// =============================================
// QUIZ LOGIC
// =============================================

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[cur];
  const pct = Math.round((cur / QUESTIONS.length) * 100);

  document.getElementById('qLabel').textContent = `Q${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('qPct').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('qNum').textContent = `QUESTION ${String(cur+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;

  const card = document.getElementById('qCard');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  const saved = answers[cur];
  CHOICES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (saved && saved.choiceIdx === i ? ' selected' : '');
    btn.innerHTML = `<span class="choice-dot"></span><span>${c.label}</span>`;
    btn.onclick = () => pick(i, c.point, btn);
    wrap.appendChild(btn);
  });

  document.getElementById('backBtn').disabled = (cur === 0);
  document.getElementById('nextBtn').disabled = (saved === null);
  document.getElementById('nextBtn').textContent = (cur === QUESTIONS.length - 1) ? '結果を見る ✨' : '次へ →';
}

function pick(idx, point, btn) {
  answers[cur] = { choiceIdx: idx, point };
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function goNext() {
  if (answers[cur] === null) return;
  cur++;
  if (cur < QUESTIONS.length) {
    renderQuestion();
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
}

function goBack() {
  if (cur === 0) return;
  cur--;
  renderQuestion();
  window.scrollTo(0, 0);
}

// =============================================
// RESULT
// =============================================

function calculateScores() {
  const scores = [0,0,0,0,0,0,0,0];
  answers.forEach((ans, i) => {
    if (ans !== null) scores[QUESTIONS[i].type] += ans.point;
  });
  return scores;
}

function nl(text) {
  return text.replace(/\n\n/g, '<br><br>');
}

function retry() {

</script>
