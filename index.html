<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>じぶんタイプ診断 | にか</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #fff9f0 0%, #fef3e2 50%, #fff5ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .container { max-width: 480px; width: 100%; }

    /* ========== START ========== */
    #startScreen { text-align: center; padding: 48px 16px 32px; }
    .start-logo { font-size: 56px; margin-bottom: 20px; }
    .start-subtitle {
      font-size: 13px; color: #F5B942; letter-spacing: 2px;
      margin-bottom: 8px; font-weight: 500;
    }
    .start-title {
      font-size: 24px; font-weight: 700; color: #333;
      line-height: 1.4; margin-bottom: 20px;
    }
    .start-sub {
      font-size: 14px; color: #666; line-height: 2;
      margin-bottom: 16px;
    }
    .start-badges {
      display: flex; justify-content: center; gap: 28px;
      margin-bottom: 36px;
    }
    .badge { text-align: center; }
    .badge-num { font-size: 28px; font-weight: 700; color: #F5B942; }
    .badge-label { font-size: 12px; color: #999; margin-top: 2px; }

    /* ========== PROGRESS ========== */
    #questionScreen { display: none; padding-top: 8px; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #999; margin-bottom: 8px;
    }
    .progress-track {
      height: 6px; background: #e4e4e4; border-radius: 3px;
      overflow: hidden; margin-bottom: 24px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #F5B942, #ffd980);
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ========== QUESTION ========== */
    .q-card {
      background: #fff; border-radius: 20px;
      padding: 28px 22px; margin-bottom: 14px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.07);
    }
    .q-num {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      color: #F5B942; margin-bottom: 14px; text-transform: uppercase;
    }
    .q-text { font-size: 17px; font-weight: 500; color: #2d2d2d; line-height: 1.75; }

    .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .choice-btn {
      background: #fff; border: 1.5px solid #e8e8e8;
      border-radius: 13px; padding: 15px 18px;
      text-align: left; font-size: 14px; color: #444;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex; align-items: center; gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover { border-color: #F5B942; background: #f0f8fc; }
    .choice-btn.selected {
      border-color: #F5B942;
      background: linear-gradient(135deg, #F5B942, #e8a020);
      color: #fff;
    }
    .choice-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid currentColor; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .choice-btn.selected .choice-dot::after {
      content: ''; width: 8px; height: 8px;
      background: #fff; border-radius: 50%;
    }

    /* ========== NAV BUTTONS ========== */
    .nav-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-back {
      flex: 1; border: 1.5px solid #ddd; border-radius: 13px;
      padding: 14px; font-size: 14px; color: #999; background: transparent;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }
    .btn-back:hover:not(:disabled) { border-color: #F5B942; color: #F5B942; }
    .btn-back:disabled { opacity: 0.35; cursor: default; }
    .btn-next {
      flex: 2; border: none; border-radius: 13px;
      padding: 14px; font-size: 15px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #F5B942, #e8a020);
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.25s;
    }
    .btn-next:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(133,181,211,0.4); }
    .btn-next:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

    /* ========== RESULT ========== */
    #resultScreen { display: none; }
    .result-top { text-align: center; padding: 36px 0 24px; }
    .result-label { font-size: 13px; color: #999; margin-bottom: 12px; }
    .result-emoji { font-size: 72px; display: block; margin-bottom: 14px; }
    .result-tag {
      display: inline-block; font-size: 12px; font-weight: 600;
      letter-spacing: 1px; color: #fff; border-radius: 20px;
      padding: 5px 16px; margin-bottom: 12px;
    }
    .result-name { font-size: 24px; font-weight: 700; color: #222; }

    .r-catchphrase {
      background: #fff; border-radius: 18px; padding: 22px 24px;
      margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
    }
    .r-catchphrase p {
      font-size: 16px; font-weight: 700; color: #333;
      line-height: 1.8; letter-spacing: 0.3px;
    }

    .r-card {
      background: #fff; border-radius: 18px; padding: 22px 20px;
      margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .r-card-title {
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      color: #F5B942; margin-bottom: 12px;
    }
    .r-card p { font-size: 14px; color: #555; line-height: 2; }

    .cta-card {
      background: linear-gradient(135deg, #fff8ee, #ffefd5);
      border-radius: 18px; padding: 22px 20px;
      margin-bottom: 14px; text-align: center;
    }
    .cta-card p { font-size: 14px; color: #555; line-height: 2; margin-bottom: 0; }

    /* Score bars */
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .score-name { font-size: 12px; color: #666; width: 120px; flex-shrink: 0; }
    .score-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .score-fill {
      height: 100%; border-radius: 4px; width: 0%;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .score-val { font-size: 12px; color: #aaa; width: 20px; text-align: right; }

    .btn-main {
      width: 100%; border: none; border-radius: 14px;
      padding: 18px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      color: #fff; transition: all 0.3s; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
    .btn-sub {
      width: 100%; border: 1.5px solid #ddd; border-radius: 14px;
      padding: 14px; font-size: 14px; color: #999; background: transparent;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }
    .btn-sub:hover { border-color: #F5B942; color: #F5B942; }

    .footer-note { text-align: center; font-size: 12px; color: #bbb; margin-top: 16px; padding-bottom: 8px; }

    .fade-up { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ===== START SCREEN ===== -->
  <div id="startScreen">
    <div class="start-logo">🔅</div>
    <div class="start-subtitle">〜あなたの潜在意識のブレーキを見つける〜</div>
    <h1 class="start-title">じぶんタイプ診断</h1>
    <p class="start-sub">
      「なぜか同じことを繰り返してしまう」<br>
      「やりたいのに動けない」<br>
      「自分の気持ちがよくわからない」<br><br>
      その根っこにある<strong>潜在意識のパターン</strong>を<br>
      24の質問で明らかにします。<br><br>
      <span style="font-size:13px; color:#F5B942; font-weight:600;">✦ 直感でサクッと答えてみてください🔅</span>
    </p>
    <div class="start-badges">
      <div class="badge"><div class="badge-num">24</div><div class="badge-label">問</div></div>
      <div class="badge"><div class="badge-num">3〜5</div><div class="badge-label">分</div></div>
      <div class="badge"><div class="badge-num">8</div><div class="badge-label">タイプ</div></div>
    </div>
    <button class="btn-main" style="background: linear-gradient(135deg,#F5B942,#e8a020)" onclick="startQuiz()">
      診断をはじめる ✨
    </button>
    <p class="footer-note">にか🔅</p>
  </div>

  <!-- ===== QUESTION SCREEN ===== -->
  <div id="questionScreen">
    <div class="progress-meta">
      <span id="qLabel">Q1 / 24</span>
      <span id="qPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="q-card fade-up" id="qCard">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <p class="q-text" id="qText"></p>
    </div>
    <div class="choices" id="choicesWrap"></div>
    <div class="nav-row">
      <button class="btn-back" id="backBtn" onclick="goBack()">← 戻る</button>
      <button class="btn-next" id="nextBtn" onclick="goNext()" disabled>次へ →</button>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="resultScreen"></div>

</div>

<script>
const QUESTIONS = [
  { text:"「もっとできる人間にならないといけない」「まだまだ足りない」と、焦りや義務感を感じることがある", type:0 },
  { text:"「本当はどうしたいの？」と聞かれると、すぐに答えが出てこない", type:3 },
  { text:"嫌だと思っても断れず、後から「なんで断れなかったんだろう」と後悔することがある", type:6 },
  { text:"人に頼むより自分でやった方が早いと思い、つい一人で抱え込んでしまう", type:1 },
  { text:"やりたいことがあるのに、なぜか最初の一歩が踏み出せない", type:4 },
  { text:"何か失敗すると、必要以上に長く自分を責めてしまう", type:7 },
  { text:"「またこのパターンか…」と、同じ状況や人間関係を繰り返している気がする", type:2 },
  { text:"お金を受け取ることや「稼ぐ」ことに、なんとなく罪悪感がある", type:5 },
  { text:"お金を稼ぐことに、どこかで「自分がそんなに稼いでいいのか」と感じることがある", type:0 },
  { text:"自分の気持ちより、相手がどう思うかを先に考えてしまう", type:3 },
  { text:"人に嫌われることが怖くて、本音が言えないことが多い", type:6 },
  { text:"「大丈夫？」と聞かれると反射的に「大丈夫です」と答えてしまう", type:1 },
  { text:"完璧にできないなら、やらない方がいいと思ってしまうことがある", type:4 },
  { text:"褒められても素直に喜べず、「どうせお世辞だ」「私なんかが…」と思ってしまうことがある", type:7 },
  { text:"過去の出来事が頭から離れず、今の行動に影響していると感じる", type:2 },
  { text:"値段を見て「私には勿体ない」「私には合わない」と感じてしまうことがある", type:5 },
  { text:"「もっとしっかりしなきゃ」と、常に自分にプレッシャーをかけている", type:0 },
  { text:"感情を表に出すのが苦手で、いつも「平気なふり」をしてしまっている", type:3 },
  { text:"過去に裏切られた経験から、人を信じることが難しくなっている", type:6 },
  { text:"周りの人が幸せでないと、自分だけ幸せになってはいけない気がする", type:1 },
  { text:"「いつかやろう」「準備ができたら」と先延ばしにしていることがある", type:4 },
  { text:"自分のことを好きになれない、または自分に優しくすることが苦手だ", type:7 },
  { text:"特定の場面や言葉で、急に気持ちが沈んだり体が固まったりすることがある", type:2 },
  { text:"お金の話になると緊張したり、話題を変えたくなる気持ちがある", type:5 },
];

const CHOICES = [
  { label:"すごくそう思う",  point:3 },
  { label:"わりとそう思う",  point:2 },
  { label:"少しそう思う",    point:1 },
  { label:"あまり思わない",  point:0 },
];

const TYPES = [
  {
    emoji:"🔥", name:"お父さんの影響タイプ", color:"#FF9A3C",
    catchphrase:"頑張れば頑張るほど、自分が遠くなっていくあなたへ",
    desc:"「もっとできるはず」「まだ足りない」という感覚、どこかに染みついていませんか？\n\n結果を出しても、すぐに「次」を探してしまう。誰かに「よかったよ」と言ってもらっても、頭では分かるのに、なぜか心まで届かない。休もうとすると罪悪感が出てきて、のんびりしていたら「サボってる」みたいな気がしてしまう。\n\nお金に対しても、受け取ることへのモヤモヤした感覚がありませんか。「私がこんなに稼いでいいのかな」「高い値段をつけていいのかな」という気持ち。それは欲張りなのでも謙虚なのでもなく、もっと深いところにある設定から来ています。\n\nこのパターンの根っこには、お父さんとの関係の中で「頑張っていないと認めてもらえない」「結果を出してこそ価値がある」と潜在意識が学んできたことが多いんです。それはあなたの性格じゃない。当時の一番賢い生き方だっただけです。\n\n今でも「頑張っていない自分には価値がない」という感覚がどこかにあるとしたら、それはまだその設定が静かに動いているサインかもしれません。",
    strengths:"このパターンを持つ人は、強さと誠実さと、高いビジョンを同時に持っています。\n\n高い基準を自分に課せるのは、それだけの実力と想いがある証拠。責任感が強く、任されたことを最後までやり遂げる。周りから「頼れる人」として見られることが多いはずです。\n\n頑張り続けてきたその力は本物。ただその力を、自分を追い詰めるためではなく、自分を喜ばせるために使えたとき、何かが大きく変わります。",
    relationships:"「しっかりしてる」「強そう」と思われることが多く、自然とリーダー的な立場になることも。頼られることは得意なのに、自分が誰かを頼ることがとても苦手です。\n\n弱みを見せたら軽く見られる気がする。甘えたいのに、甘え方がわからない。本当は疲れているのに「大丈夫です」と答えてしまう。\n\n「完璧でいないと愛されない」という感覚が、一番近い人との関係にも、じわじわと影響していることがあります。",
    future:"「頑張らなくていいよ」という言葉が、頭だけじゃなく体の中から感じられるようになります。\n\nお金を受け取ることへの罪悪感がなくなり、豊かさを自然に受け取れるようになる。達成したとき、次じゃなく今を喜べるようになる。\n\n「今の自分で十分」という感覚は、遠い話じゃありません。その設定がどこから来たのかを一緒に見ていくことが、最初の一歩になります。",
  },
  {
    emoji:"🌸", name:"お母さんの影響タイプ", color:"#F4A0B8",
    catchphrase:"ひとりで頑張ることが、当たり前になっているあなたへ",
    desc:"「大丈夫？」と聞かれたとき、本当は大丈夫じゃなくても「大丈夫です」と答えてしまう。誰かに頼む前に「迷惑じゃないかな」「自分でできるし」と考えて、結局ひとりで抱え込んでしまう。そんなこと、ありませんか？\n\n弱音を吐いたら引かれるかもしれない。甘えたら重たいと思われるかもしれない。そんな気持ちがいつもどこかにあって、「大丈夫な私」を演じ続けてきた。本当は疲れているのに、「まだ大丈夫」と自分に言い聞かせながら。\n\n周りの人が幸せでないと、自分だけ先に幸せになってはいけない気がする。そんな感覚はありませんか。「私が楽になっていいのかな」という、罪悪感のようなもの。\n\nこの根っこには、お母さんとの関係の中で「甘えてはいけない」「しっかりしなきゃ」と学んできたパターンが眠っていることが多いんです。それはあなたが強いからじゃない。そうするしかなかった環境の中で、賢く生きてきた証。\n\n本当は誰かにそばにいてほしかった。その気持ちは、今もちゃんとそこにあります。",
    strengths:"このパターンを持つ人は、人一倍深い思いやりと、場を支える力を持っています。\n\n誰かが困っていたら自然と動ける、気配りができる、信頼される。「しっかりしてる人」として見られることが多いはずです。その優しさと責任感は、本物の才能。\n\nただ、その力をずっと「誰かのため」だけに使ってきた。その力を、自分自身のためにも使えるようになったとき、あなたの人生は変わります。",
    relationships:"人に頼られることは得意なのに、自分が誰かを頼ることはとても苦手。「なんで私ばかり」と感じることがあっても、それを口に出せない。\n\n本音を言ったら嫌われるんじゃないか、重たいと思われるんじゃないか、という恐れがいつもどこかにある。だから「いい人」を演じ続けて、気づいたら心がすり減っていることも。\n\n表面上は明るく振る舞えているのに、心の中ではひとりで孤独を感じていることがあるかもしれません。",
    future:"「助けて」が自然に言える日が来ます。\n\n頼ることへの罪悪感がなくなって、誰かに甘えることが「迷惑」じゃなく「お互い様」と感じられるようになる。自分が先に幸せになっていいと、体の底から感じられるようになります。\n\nひとりで抱え込まなくていい、という感覚を体に馴染ませるために、何かを手放す必要があります。何を手放せばいいのかは、話しながら一緒に見つけていけます。",
  },
  {
    emoji:"💭", name:"過去の記憶タイプ", color:"#B09FD8",
    catchphrase:"なぜか同じことを繰り返してしまう、そのループにはちゃんと理由があります",
    desc:"「またこのパターンだ…」と感じたことはありませんか？人間関係でも、仕事でも、なぜか似たような状況が繰り返されてしまう。変えようとしているのに、気づけば同じところに戻ってきている。\n\n特定の言葉や場面に触れたとき、急に気持ちが沈んだり、体が固まるような感覚になることがある。それはトラウマとか大げさなことじゃなくて、過去のある体験が今もそのまま潜在意識に残っているサインです。\n\n繰り返してきたのは、意志が弱いからでも、運が悪いからでもない。潜在意識が過去の体験をもとに「これが安全」と判断して、同じ選択をし続けているだけなんです。\n\n記憶は消えなくても、その記憶に対する「感情」は変えることができます。それを知ったとき、ループの外に出る道が見えてきます。",
    strengths:"このパターンを持つ人は、深い共感力と、人の痛みに寄り添える力を持っています。\n\n自分が辛い体験をしてきたからこそ、誰かが苦しんでいるとき、言葉にしなくてもわかる。表面じゃなく、深いところで繋がれる人です。\n\n何度も壁にぶつかりながらも、また立ち上がってきた。その強さは本物。ループに気づいているということ自体、すでに大事な一歩です。",
    relationships:"無意識に、過去の人間関係のパターンを今の関係に重ねてしまうことがあります。\n\n「また同じだ」という感覚が先に来てしまって、新しい関係をフラットに見れないことがある。親しくなりかけると、なぜかこちらから距離を置いてしまうこともあるかもしれません。\n\nそれはあなたが冷たいのでも、人嫌いなのでもない。心が、傷つかないように守ってくれているだけです。ただその壁が、本当は望んでいる繋がりを遠ざけていることもある。",
    future:"同じパターンを繰り返さなくなる、という体験が少しずつ増えていきます。\n\n「またどうせ…」という声が静かになって、今の状況を今の目で見られるようになる。新しい選択が、自然にできるようになっていく。\n\n過去は変えられなくても、過去への感情は変えられます。その体験をするための場所が、セッションです。",
  },
  {

// =============================================
// STATE
// =============================================
let cur = 0;
let answers = new Array(QUESTIONS.length).fill(null);

// =============================================
// QUIZ LOGIC
// =============================================

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[cur];
  const pct = Math.round((cur / QUESTIONS.length) * 100);

  document.getElementById('qLabel').textContent = `Q${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('qPct').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('qNum').textContent = `QUESTION ${String(cur+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;

  const card = document.getElementById('qCard');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  const saved = answers[cur];
  CHOICES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (saved && saved.choiceIdx === i ? ' selected' : '');
    btn.innerHTML = `<span class="choice-dot"></span><span>${c.label}</span>`;
    btn.onclick = () => pick(i, c.point, btn);
    wrap.appendChild(btn);
  });

  document.getElementById('backBtn').disabled = (cur === 0);
  document.getElementById('nextBtn').disabled = (saved === null);
  document.getElementById('nextBtn').textContent = (cur === QUESTIONS.length - 1) ? '結果を見る ✨' : '次へ →';
}

function pick(idx, point, btn) {
  answers[cur] = { choiceIdx: idx, point };
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function goNext() {
  if (answers[cur] === null) return;
  cur++;
  if (cur < QUESTIONS.length) {
    renderQuestion();
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
}

function goBack() {
  if (cur === 0) return;
  cur--;
  renderQuestion();
  window.scrollTo(0, 0);
}

// =============================================
// RESULT
// =============================================

function calculateScores() {
  const scores = [0,0,0,0,0,0,0,0];
  answers.forEach((ans, i) => {
    if (ans !== null) scores[QUESTIONS[i].type] += ans.point;
  });
  return scores;
}

function nl(text) {
  return text.replace(/\n\n/g, '<br><br>');
}

function retry() {
